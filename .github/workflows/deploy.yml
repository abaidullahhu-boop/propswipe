name: Deploy to Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euxo pipefail
            cd /var/www/propswipe
            git fetch origin production
            git checkout production
            git reset --hard origin/production
            if [ -f package-lock.json ]; then
              npm ci --include=dev --no-audit --no-fund
            else
              npm install --no-audit --no-fund
            fi
            npm run build
            if pm2 describe propswipe >/dev/null 2>&1; then
              pm2 restart propswipe --update-env
            else
              pm2 start npm --name propswipe -- start
            fi
            sleep 5
            pm2 describe propswipe
            pm2 logs propswipe --lines 30 --nostream

      - name: Send failure email
        if: ${{ failure() && env.MAIL_USERNAME != '' && env.MAIL_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Propswipe Deployment Failed"
          to: ${{ secrets.MAIL_USERNAME }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Deployment failed!
            Commit: ${{ github.sha }}
            See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
